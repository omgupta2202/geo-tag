name: geo_lens
description: Advanced GeoTag Camera App with Tactical Minimalism UI.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  camera: ^0.12.0
  geolocator: ^14.0.2
  flutter_compass: ^0.8.1
  sensors_plus: ^6.1.1
  sqflite: ^2.3.0
  path_provider: ^2.1.1
  path: ^1.8.3
  flutter_map: ^8.2.2
  latlong2: ^0.9.1
  image: ^4.1.3
  intl: ^0.20.2
  share_plus: ^12.0.1
  permission_handler: ^12.0.1
  provider: ^6.0.5
  google_fonts: ^6.2.1
  flutter_staggered_grid_view: ^0.7.0
  geocoding: ^3.0.0
  shared_preferences: ^2.2.2
  http: ^1.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
