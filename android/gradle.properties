# Performance
org.gradle.daemon=true
org.gradle.parallel=true
org.gradle.caching=true

# Controlled memory (THIS is the fix)
org.gradle.jvmargs=-Xmx2g -XX:MaxMetaspaceSize=512m -XX:ReservedCodeCacheSize=256m -Dfile.encoding=UTF-8

# Stability
org.gradle.workers.max=4

# Android
android.useAndroidX=true